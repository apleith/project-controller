# Dev Process Manager — Application Registry
# Grouped by life-os zone. Each app has a start command, working directory, and port.

personal:
  - id: weight-tracker
    name: Weight Tracker
    description: Bariatric weight dashboard + Chrome new-tab
    dir: "E:\\Projects\\apleith\\weight-tracker"
    command: "python run.py serve"
    port: 8080
    auto_start: true

  - id: open-webui
    name: Open WebUI
    description: Free local LLM web interface (Docker)
    dir: "D:\\hub\\projects\\open-webui-launcher"
    command: "python -m common.launch_main"
    port: 3000
    auto_start: false

  - id: dev-manager
    name: Dev Manager
    description: This process manager
    dir: "E:\\Projects\\apleith\\dev-manager"
    command: "python app.py"
    port: 5050
    auto_start: true

  - id: cairn
    name: Cairn
    description: Unified bariatric + GLP-1 + general health tracker. Phone-reachable Flask + PWA + ntfy prompt engine. Renamed 2026-05-22 from life-os-bridge.
    dir: "E:\\Projects\\apleith\\cairn"
    command: ".venv\\Scripts\\python.exe app.py"
    port: 5151
    auto_start: true

  - id: ghostwriter
    name: Ghostwriter
    description: Multi-register voice-profile-aware ghostwriter (Tauri desktop, PERS-010). Stage 1 shipped 2026-05-11. Do not use for public-facing drafts until Stage 5 ships.
    dir: "E:\\Projects\\apleith\\ghostwriter"
    command: "npm run tauri dev"
    port: null
    auto_start: false
    note: "Tauri desktop app with Python FastAPI sidecar; sidecar port is dynamic (printed on stdout). Dev manager tracks process presence, not port. Vite dev URL is http://localhost:1420 during dev mode."

  - id: vr-work-bridge
    name: VR Work Bridge
    description: VR life-os status panel + OVR Toolkit headset notifications (PERS, heading to AURA Lab). Panel http://127.0.0.1:8770/, OVRT custom app "life-os".
    dir: "E:\\Projects\\apleith\\vr-work-bridge"
    command: "C:\\Users\\alexl\\AppData\\Local\\Python\\pythoncore-3.14-64\\python.exe app.py"
    port: 8770
    auto_start: true

professor:
  - id: teachassist
    name: TeachAssist
    description: LLM-backed course builder
    dir: "E:\\OneDrive\\Desktop\\course-builder"
    command: "python app.py --web"
    port: 5147
    auto_start: false

llc:
  - id: ibis
    name: Ibis
    description: Local Whisper transcription app (dev mode)
    dir: "E:\\Projects\\SIM-DAD\\ibis"
    command: "E:\\Projects\\SIM-DAD\\ibis\\venv\\Scripts\\pythonw.exe main.py --dev"
    port: null
    auto_start: false

  - id: lector
    name: Lector
    description: Markdown editor with TTS (post-Tauri-pivot; shares venv + USER_DATA_DIR with launch.bat)
    dir: "E:\\Projects\\SIM-DAD\\lector"
    command: 'set "LECTOR_PRODUCTION=1" && set "LECTOR_SKIP_TTS_PRELOAD=1" && "%LOCALAPPDATA%\Lector\.venv\Scripts\python.exe" server.py'
    port: 7860
    auto_start: false

  - id: tass
    name: TASS
    description: Text analysis desktop app
    dir: "E:\\Projects\\SIM-DAD\\tass"
    command: "E:\\Projects\\SIM-DAD\\tass\\.venv\\Scripts\\python.exe main.py"
    port: null
    auto_start: false

services:
  - id: vllm-heavy
    name: vLLM (Qwen3-30B)
    description: Local LLM serving — Qwen3-30B-A3B-Instruct-2507-AWQ on RTX 3090
    dir: "E:\\Projects\\apleith\\vllm-serving"
    command: "powershell -ExecutionPolicy Bypass -File start.ps1"
    port: 8000
    auto_start: true
    local_llm: true   # watchdog skips this when no-local-mode flag is set
    note: "Cold-start ~30-60s. Must come up before LiteLLM. Health: GET http://localhost:8000/v1/models"

  - id: litellm-proxy
    name: LiteLLM Proxy
    description: Routing layer — local-heavy / local-fast / claude-fallback aliases
    dir: "E:\\Projects\\apleith\\litellm-proxy"
    command: "powershell -ExecutionPolicy Bypass -File start.ps1"
    port: 4000
    auto_start: true
    local_llm: true   # watchdog skips this when no-local-mode flag is set
    depends_on: vllm-heavy
    note: "Health: GET http://localhost:4000/health/readiness"

  - id: langfuse
    name: Langfuse
    description: LLM tracing for cost + quality measurement
    dir: null
    command: null
    port: 3030
    managed: false
    note: "Runs as Docker container. Monitor only. Restart via docker compose if down."

  - id: ollama-deprecated
    name: Ollama (deprecated 2026-05-07)
    description: Replaced by vLLM. Kept as monitor-only in case any legacy script still pings it.
    dir: null
    command: null
    port: 11434
    managed: false
    auto_start: false
    note: "DEPRECATED. Do not autostart. Remove this entry once /audit confirms no live references in life-os scripts (Task 0.4)."
